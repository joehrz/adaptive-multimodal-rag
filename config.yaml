# Adaptive Multimodal RAG Configuration
# Edit this file to customize the system behavior

# LLM Settings
llm:
  model: "qwen2.5:14b"  # Ollama model to use (qwen2.5:3b, qwen2.5:7b, qwen2.5:14b, llama3.1:8b, etc.)
  temperature: 0.3      # Generation temperature (0.0-1.0, lower = more focused)
  max_tokens: 1000      # Maximum tokens for response generation

# Embedding Settings
embeddings:
  model: "all-MiniLM-L6-v2"  # HuggingFace embedding model
  device: "cpu"              # Device for embeddings (cpu, cuda)
  backend: "huggingface"     # "huggingface" or "ollama" (use nomic-embed-text for ollama)

# Ollama Server
ollama:
  url: "http://localhost:11434"  # Override with RAG_OLLAMA_URL env var for Docker
  timeout: 120                   # Request timeout in seconds

# Reranking
reranker:
  enabled: true                                    # Enable cross-encoder reranking
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"   # Cross-encoder model for reranking
  device: "cpu"                                    # Device for reranker (cpu, cuda)
  top_k: 10                                        # Number of documents to keep after reranking
  candidates: 30                                   # Number of candidates to retrieve before reranking

# Document Processing
documents:
  chunk_size: 1000      # Size of document chunks in characters
  chunk_overlap: 200    # Overlap between chunks
  k_retrieval: 10       # Number of documents to retrieve
  chunking_strategy: "recursive"  # "recursive" or "semantic"

# Vector Database
vector_db:
  persist_directory: "./data/chroma_db_ollama"
  hyde_persist_directory: "./data/chroma_db_hyde"

# Strategy Settings
strategies:
  # Complexity thresholds for routing
  simple_max: 3         # 0-3 = Simple (Baseline RAG)
  medium_max: 7         # 4-7 = Medium (HyDE)
  complex_min: 8        # 8-10 = Complex (HyDE + Self-RAG)
  graphrag_min: 6       # Minimum complexity for GraphRAG

  # HyDE settings
  hyde:
    temperature: 0.7              # Higher temp for creative hypothetical generation
    hypothetical_max_tokens: 300  # Max tokens for hypothetical document

  # Self-RAG settings
  self_rag:
    max_regenerations: 2          # Max times to regenerate if quality is low
    quality_threshold: 0.5        # Minimum quality score before regeneration

  # GraphRAG settings
  graphrag:
    max_hops: 3                   # Maximum hops in graph traversal
    timeout: 60                   # Timeout for LLM calls in seconds

# Caching
cache:
  enabled: true
  auto_cleanup: true
  ttl_seconds: 3600     # Cache time-to-live (1 hour)

# UI Settings
ui:
  page_title: "Adaptive RAG System"
  default_strategy: "adaptive"  # adaptive, baseline, hyde, self_rag, graphrag

# Logging
logging:
  level: "INFO"         # DEBUG, INFO, WARNING, ERROR
  verbose: false        # Enable verbose console output
